# -- Terminal ------------------------------------------------
set -s default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-features ",ghostty:hyperlinks"
set -s extended-keys on
set -g extended-keys-format csi-u

# -- Status position ----------------------------------------
set -g status-position top

# -- Timing -------------------------------------------------
set -s escape-time 0
set -g display-time 4000
set -g status-interval 5

# -- Behaviour ----------------------------------------------
set -g history-limit 50000
set -g focus-events on
set -g status-keys emacs
setw -g aggressive-resize on
set -g mouse off
set -g allow-passthrough on

# -- Catppuccin ---------------------------------------------
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

run-shell "$CATPPUCCIN_TMUX_PATH"

# -- Status line --------------------------------------------
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

run-shell "$TMUX_CPU_PATH"
run-shell "$TMUX_BATTERY_PATH"
run-shell "$TABBY_TMUX_PATH"

# -- Indexing -----------------------------------------------
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# -- Prefix: C-o --------------------------------------------
# C-o keeps both fingers on the Programmer Dvorak left home row (C-a would
# require the pinky for ctrl and the ring for 'a', which is an awkward
# stretch on a MacBook keyboard with no right-side control key).
unbind C-b
set -g prefix C-o
bind C-o send-prefix

# -- Reload -------------------------------------------------
bind R source-file ~/.tmux.conf \; display-message "Reloaded tmux.conf"

# -- Sessions -----------------------------------------------
bind X kill-session
bind M-x confirm-before -p "Kill ALL sessions? (y/n)" kill-server

# -- Splits -------------------------------------------------
# e and u are adjacent on the Dvorak left home row, making them easy to
# remember as a pair. The defaults (% and ") require shifts and are
# scattered across the keyboard.
unbind '"'
unbind %
bind e split-window -v -c "#{pane_current_path}"
bind u split-window -h -c "#{pane_current_path}"

# -- Windows ------------------------------------------------
bind o new-window
bind O last-window
bind , command-prompt "rename-window '%%'"
bind C-p previous-window
bind C-n next-window

# -- Copy mode ----------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# -- Sesh (tmux) --------------------------------------------
bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

bind-key x kill-pane
set -g detach-on-destroy off
bind -N "last-session (via sesh) " L run-shell "sesh last"
bind -N "switch to root session (via sesh) " 9 run-shell "sesh connect --root $(pwd)"
